name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish_npm:
        description: "Publish to npm (requires NPM_TOKEN secret)"
        required: true
        type: boolean
        default: false
      tag:
        description: "Tag to emit version-tuple for (backfill mode; leave empty for normal dispatch)"
        required: false
        default: ''

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    outputs:
      package: ${{ steps.pack.outputs.filename }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Pack tarball
        id: pack
        run: |
          name=$(npm pack --silent)
          echo "filename=$name" >> "$GITHUB_OUTPUT"
      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: |
            dist/
            *.tgz
          if-no-files-found: error

  github-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: artifacts/
      - name: Extract tag message
        id: tag
        run: |
          echo "message<<EOF" >> $GITHUB_OUTPUT
          git tag -l --format='%(contents)' ${{ github.ref_name }} >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.tag.outputs.message }}
          generate_release_notes: true
          files: artifacts/*.tgz

      - name: Strip leading v from tag
        run: echo "VALUE=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - uses: continuonai/rcan-spec/.github/actions/emit-version-tuple@v3.2.0
        with:
          project: rcan-ts
          ran: ${{ secrets.RCAN_TS_RELEASE_RAN }}
          field: sdk_version_ts
          value: ${{ env.VALUE }}
          depends_on: '{"protocol_version":">=3.2.0"}'
          pq_signing_key: ${{ secrets.RCAN_TS_RELEASE_PQ_PRIV }}
          pq_kid: ${{ secrets.RCAN_TS_RELEASE_KID }}
          ed25519_signing_key: ${{ secrets.RCAN_TS_RELEASE_PRIV }}
          ed25519_kid: ${{ secrets.RCAN_TS_RELEASE_KID }}
          release_tag: ${{ github.ref_name }}

  npm-publish:
    # Manual-only until NPM_TOKEN is configured for continuonai/rcan-ts.
    # Trigger via Actions → Release → Run workflow → publish_npm=true.
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish_npm == 'true'
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  backfill-emit:
    name: Emit signed version-tuple envelope (backfill)
    if: github.event_name == 'workflow_dispatch' && inputs.tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Determine tag
        id: tag
        run: |
          TAG="${{ inputs.tag }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Ensure GitHub release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "${{ steps.tag.outputs.tag }}" >/dev/null 2>&1; then
            gh release create "${{ steps.tag.outputs.tag }}" \
              --title "rcan-ts ${{ steps.tag.outputs.tag }}" \
              --generate-notes
          fi

      - uses: continuonai/rcan-spec/.github/actions/emit-version-tuple@v3.2.0
        with:
          project: rcan-ts
          ran: ${{ secrets.RCAN_TS_RELEASE_RAN }}
          field: sdk_version_ts
          value: ${{ steps.tag.outputs.version }}
          depends_on: '{"protocol_version":">=3.2.0"}'
          pq_signing_key: ${{ secrets.RCAN_TS_RELEASE_PQ_PRIV }}
          pq_kid: ${{ secrets.RCAN_TS_RELEASE_KID }}
          ed25519_signing_key: ${{ secrets.RCAN_TS_RELEASE_PRIV }}
          ed25519_kid: ${{ secrets.RCAN_TS_RELEASE_KID }}
          release_tag: ${{ steps.tag.outputs.tag }}
